# Mio keeps the critical libmpv options in code so it never depends on a user-global mpv.conf.
# This file documents the intended local defaults and future advanced switches.

vo=gpu-next
gpu-api=d3d11
gpu-context=d3d11
d3d11-output-mode=composition
hwdec=d3d11va
target-colorspace-hint=auto
input-default-bindings=no
input-vo-keyboard=no
keep-open=no

